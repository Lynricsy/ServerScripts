set -g set-clipboard on
set -g allow-passthrough on
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-sensible'       # 基础默认配置优化
set -g @plugin 'tmux-plugins/tmux-resurrect'      # 环境保存与恢复
set -g @plugin 'tmux-plugins/tmux-continuum'      # 自动保存环境
set -g @continuum-restore 'on'

##### Base comfort #####
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"           # truecolor，配色更稳
set -g focus-events on                       # pane focus 事件（一些状态插件会用）
unbind -n MouseDown3Pane

##### Zellij-ish layout vibes #####
set -g status-position top                   # 状态栏在顶部（标签和状态都在这里喵～）
set -g status-justify left                   # 【修改】标签页靠左对齐，更有 Zellij 的感觉！
set -g status-interval 1
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# pane 边框更清晰
# 注意哦：只有一个窗格时看不到外框，分割后才会显示完美的实线边框喵！
set -g pane-border-lines heavy               # 边框更"实"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# 可选：如果 Ling 想在单一窗格也强行看到一条带有窗格编号的边框，可以取消注释下面这行：
# set -g pane-border-status top 

# 分割线更好看
set -g window-active-style "bg=default"
set -g window-style "bg=default"

##### Keybinds more zellij-like #####
# 更直觉的分割： | 和 -
bind | split-window -h
bind - split-window -v

##### Catppuccin config #####
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_pane_border_style "fg=#45475a"
set -g @catppuccin_pane_active_border_style "fg=#89b4fa"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

##### Status line modules #####
set -g status-right-length 120
set -g status-left-length 120

set -g status-left ""
# 状态信息统一放在顶部右侧喵～
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag  status-right "#{E:@catppuccin_status_session}"
set -ag  status-right "#{E:@catppuccin_status_uptime}"

# cpu plugin
run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
set-option -g automatic-rename off

# 2. 告诉 Catppuccin 主题，标签页要显示 Window 的真实名字 (#W)，而不是当前的路径喵～
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
run '~/.tmux/plugins/tpm/tpm'
